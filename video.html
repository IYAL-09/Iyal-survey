<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ads Player</title>

<!-- Video.js -->
<link href="https://vjs.zencdn.net/8.0.4/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/8.0.4/video.min.js"></script>

<!-- Video.js Ads core -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-ads/7.3.2/videojs-contrib-ads.min.js"></script>

<!-- VAST plugin -->
<script src="https://cdn.jsdelivr.net/npm/videojs-vast-vpaid/dist/videojs-vast-vpaid.min.js"></script>

<style>
body{
background:#07140d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.video-js{
width:100%;
max-width:800px;
height:350px;
border-radius:18px;
overflow:hidden;
}
</style>
</head>

<body>

<!-- VIDEO PLAYER -->
<video
  id="ad-video"
  class="video-js vjs-default-skin"
  controls
  playsinline
  muted
  preload="auto"
>
  <source src="https://stream.mux.com/BV3YZtogl89mg9VcNBhhnHm02Y34zI1nlMuMQfAbl3dM/highest.mp4" type="video/mp4">
</video>

<script>
var player = videojs('ad-video');

/* IMPORTANT: initialize ads system */
player.ads();

/* WAIT until player is ready */
player.ready(function () {

  /* LOAD YOUR EXOCLICK VAST */
  player.vast({
    url: "https://s.magsrv.com/v1/vast.php?idz=5938880"
  });

});
</script>

</body>
</html>
