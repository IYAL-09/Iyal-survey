<!DOCTYPE html>
<html lang="en">
<head>

<!-- Favicon -->
<link rel="icon" type="image/png" href="iyallogo.png">
<link rel="apple-touch-icon" href="iyallogo.png">
  
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account • Iyal Surveys</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  transition:
  background .3s ease,
  color .3s ease,
  border .3s ease,
  transform .3s ease,
  box-shadow .3s ease;
}

body{
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;

  background:
  radial-gradient(circle at top left,#43a04722,transparent 40%),
  radial-gradient(circle at bottom right,#2e7d3222,transparent 40%),
  linear-gradient(135deg,#f5fff7,#edf7ee);

  overflow-x:hidden;
}

.card{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.4);

  border-radius:30px;
  padding:35px;
  max-width:430px;
  width:100%;

  box-shadow:
  0 10px 40px rgba(0,0,0,.08),
  inset 0 1px 0 rgba(255,255,255,.5);

  animation:fadeUp .8s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.logo{
  text-align:center;
  margin-bottom:22px;
}

.logo img{
  width:90px;
  height:90px;
  border-radius:24px;
  object-fit:cover;

  box-shadow:
  0 10px 25px rgba(46,125,50,.25);
}

.logo h1{
  margin-top:12px;
  color:#1b5e20;
  font-size:30px;
  font-weight:800;
  letter-spacing:-1px;
}

.subtitle{
  text-align:center;
  color:#5f6f65;
  margin-top:6px;
  font-size:14px;
}

h2{
  text-align:center;
  color:#1b5e20;
  margin-bottom:25px;
  font-size:24px;
  font-weight:700;
}

.input-group{
  position:relative;
  margin-bottom:16px;
}

input{
  width:100%;
  padding:16px;
  border:1px solid #dfe5df;
  border-radius:16px;
  background:rgba(255,255,255,.85);
  font-size:15px;
  color:#222;
}

input:focus{
  outline:none;
  border-color:#43a047;
  box-shadow:0 0 0 4px rgba(67,160,71,.15);
}

.eye-toggle{
  position:absolute;
  top:50%;
  right:15px;
  transform:translateY(-50%);
  cursor:pointer;
  color:#43a047;
}

.password-checklist{
  list-style:none;
  padding-left:0;
  margin-bottom:15px;
}

.password-checklist li{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
  font-size:13px;
  color:#5f6f65;
}

.password-checklist i{
  width:16px;
}

.terms{
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin:18px 0;
  font-size:14px;
  color:#555;
}

.terms input{
  width:auto;
  margin-top:3px;
}

.terms a{
  color:#2e7d32;
  text-decoration:none;
  font-weight:600;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;

  background:linear-gradient(135deg,#2e7d32,#43a047);

  color:white;
  font-size:15px;
  font-weight:700;

  cursor:pointer;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;

  margin-top:15px;

  box-shadow:
  0 10px 25px rgba(46,125,50,.25);
}

button:hover{
  transform:translateY(-2px);
  box-shadow:
  0 14px 35px rgba(46,125,50,.35);
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.spinner{
  display:none;
  width:18px;
  height:18px;
  border:3px solid rgba(255,255,255,.4);
  border-top:3px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

.message{
  text-align:center;
  margin-top:15px;
  font-weight:600;
  font-size:14px;
}

.error{
  color:#d32f2f;
}

.success{
  color:#2e7d32;
}

.login-link{
  text-align:center;
  margin-top:22px;
  color:#666;
  font-size:14px;
}

.login-link a{
  color:#2e7d32;
  text-decoration:none;
  font-weight:700;
}

.support-btn{
  position:fixed;
  bottom:20px;
  left:20px;

  width:62px;
  height:62px;

  border-radius:50%;

  background:linear-gradient(135deg,#2e7d32,#43a047);

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
  font-size:24px;
  text-decoration:none;

  box-shadow:0 10px 30px rgba(46,125,50,.4);

  z-index:999;

  animation:pulse 2s infinite;
}

.support-btn:hover{
  transform:translateY(-5px) scale(1.05);
}

@keyframes pulse{
  0%{
    box-shadow:0 0 0 0 rgba(46,125,50,.5);
  }

  70%{
    box-shadow:0 0 0 18px rgba(46,125,50,0);
  }

  100%{
    box-shadow:0 0 0 0 rgba(46,125,50,0);
  }
}

@media(max-width:500px){

  .card{
    padding:28px 22px;
  }

  .logo h1{
    font-size:26px;
  }

}

</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="iyallogo.png" alt="Iyal Surveys">
    <h1>Iyal Surveys</h1>
    <div class="subtitle">
      Earn rewards by completing surveys online
    </div>
  </div>

  <h2>Create Account</h2>

  <form id="registerForm">

    <div class="input-group">
      <input id="full_name" placeholder="Full Name" required>
    </div>

    <div class="input-group">
      <input id="username" placeholder="Username" required>
    </div>

    <div class="input-group">
      <input id="email" type="email" placeholder="Email Address" required>
    </div>

    <div class="input-group">
      <input id="password" type="password" placeholder="Password" required>

      <span class="eye-toggle"
      onclick="togglePassword('password','eye1')">
        <i id="eye1" class="fa fa-eye"></i>
      </span>
    </div>

    <div class="input-group">
      <input id="confirm_password"
      type="password"
      placeholder="Confirm Password"
      required>

      <span class="eye-toggle"
      onclick="togglePassword('confirm_password','eye2')">
        <i id="eye2" class="fa fa-eye"></i>
      </span>
    </div>

    <ul class="password-checklist">
      <li id="checkLength">
        <i class="fa fa-times"></i>
        Minimum 6 characters
      </li>

      <li id="checkUpper">
        <i class="fa fa-times"></i>
        At least 1 uppercase letter
      </li>

      <li id="checkNumber">
        <i class="fa fa-times"></i>
        At least 1 number
      </li>

      <li id="checkSpecial">
        <i class="fa fa-times"></i>
        At least 1 special character
      </li>
    </ul>

    <div class="input-group">
      <input id="referral_code"
      placeholder="Referral Code (Optional)">
    </div>

    <div class="terms">
      <input type="checkbox" id="terms" required>

      <label for="terms">
        I agree to the
        <a href="terms.html">Terms & Conditions</a>
        <a href="privacy.html">/ Privacy Policy</a>
      </label>
    </div>

    <div class="g-recaptcha"
    data-sitekey="6Lf22SosAAAAADDRkt-YuGTX57eNEXjYSWfJJOHz"></div>

    <button id="registerBtn" type="submit">

      Create Account

      <div class="spinner" id="spinner"></div>

    </button>

    <div id="message" class="message"></div>

    <div class="login-link">
      Already have an account?
      <a href="login.html">Login</a>
    </div>

  </form>

</div>

<a href="https://wa.me/2349045776340"
class="support-btn">
  <i class="fa-solid fa-headset"></i>
</a>

<script type="module">

const ENDPOINT =
"https://xkshzlfducmnglxfnxzk.supabase.co/functions/v1/clever-handler";

const form = document.getElementById("registerForm");
const spinner = document.getElementById("spinner");
const messageBox = document.getElementById("message");
const btn = document.getElementById("registerBtn");

window.togglePassword = (inputId, iconId) => {

  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);

  if(input.type === "password"){
    input.type = "text";
    icon.classList.replace("fa-eye","fa-eye-slash");
  }else{
    input.type = "password";
    icon.classList.replace("fa-eye-slash","fa-eye");
  }
};

document.getElementById("password")
.addEventListener("input", e => {

  const val = e.target.value;

  document.getElementById("checkLength")
  .querySelector("i").className =
  val.length >= 6 ? "fa fa-check" : "fa fa-times";

  document.getElementById("checkUpper")
  .querySelector("i").className =
  /[A-Z]/.test(val) ? "fa fa-check" : "fa fa-times";

  document.getElementById("checkNumber")
  .querySelector("i").className =
  /\d/.test(val) ? "fa fa-check" : "fa fa-times";

  document.getElementById("checkSpecial")
  .querySelector("i").className =
  /[^A-Za-z0-9]/.test(val)
  ? "fa fa-check"
  : "fa fa-times";

});

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  spinner.style.display = "inline-block";
  btn.disabled = true;

  messageBox.textContent = "";

  try{

    const full_name =
    document.getElementById("full_name")
    .value.trim();

    const username =
    document.getElementById("username")
    .value.trim();

    const email =
    document.getElementById("email")
    .value.trim();

    const password =
    document.getElementById("password")
    .value;

    const confirm =
    document.getElementById("confirm_password")
    .value;

    const referral_code =
    document.getElementById("referral_code")
    .value.trim() || null;

    const terms =
    document.getElementById("terms");

    if(password !== confirm){
      throw new Error("Passwords do not match");
    }

    if(!terms.checked){
      throw new Error(
      "You must accept Terms & Conditions");
    }

    const recaptcha_token =
    grecaptcha.getResponse();

    if(!recaptcha_token){
      throw new Error(
      "Please complete the reCAPTCHA");
    }

    const res = await fetch(ENDPOINT,{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        recaptcha_token,
        full_name,
        username,
        email,
        password,
        referral_code

      })

    });

    messageBox.textContent =
"✅ Registration successful! Please check your email to confirm your account before logging in.";

messageBox.className =
"message success";

/* CLEAR FORM */
form.reset();

/* RESET RECAPTCHA */
grecaptcha.reset();

/* REDIRECT TO LOGIN */
setTimeout(() => {

  location.href = "login.html";

},4000);
  }catch(err){

    messageBox.textContent =
    "❌ " + err.message;

    messageBox.className =
    "message error";

    grecaptcha.reset();

  }finally{

    spinner.style.display = "none";
    btn.disabled = false;

  }

});

/* GET REF CODE FROM URL */

const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");

/* AUTO FILL INPUT */

if (ref) {
  const input = document.getElementById("referral_code");
  if (input) {
    input.value = ref;
  }
}

</script>

</body>
</html>
