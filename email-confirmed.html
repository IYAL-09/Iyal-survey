<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Email Confirmed • Iyal Surveys</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;

  background:
  radial-gradient(circle at top left,#43a04722,transparent 40%),
  radial-gradient(circle at bottom right,#2e7d3222,transparent 40%),
  linear-gradient(135deg,#f5fff7,#edf7ee);
}

.card{
  width:100%;
  max-width:420px;

  background:rgba(255,255,255,.8);
  backdrop-filter:blur(20px);

  border-radius:30px;
  padding:40px 30px;

  text-align:center;

  box-shadow:
  0 10px 40px rgba(0,0,0,.08);
}

.icon{
  width:100px;
  height:100px;

  margin:auto;
  margin-bottom:20px;

  border-radius:50%;

  background:linear-gradient(135deg,#2e7d32,#43a047);

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
  font-size:42px;
}

h1{
  color:#1b5e20;
  margin-bottom:15px;
}

p{
  color:#5f6f65;
  line-height:1.6;
  margin-bottom:30px;
}

a{
  display:inline-block;

  padding:15px 28px;

  border-radius:16px;

  background:linear-gradient(135deg,#2e7d32,#43a047);

  color:white;
  text-decoration:none;
  font-weight:700;

  box-shadow:
  0 10px 25px rgba(46,125,50,.25);
}

a:hover{
  transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="card">

  <div class="icon">
    <i class="fa-solid fa-check"></i>
  </div>

  <h1>Email Confirmed</h1>

  <p>
    Your email has been successfully verified.
    You can now login and start earning rewards on Iyal Surveys.
  </p>

  <a href="login.html">
    Continue to Login
  </a>

</div>

</body>
</html>
