<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AccessCode SaaS</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background:#0b0b1a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.container {
    width:420px;
    background:#141428;
    padding:25px;
    border-radius:15px;
}
input, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}
button {
    background:#6366f1;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
.code {
    margin-top:15px;
    font-size:22px;
    letter-spacing:4px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">
    <h2>Access Code Generator</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="phone" placeholder="Phone Number">
    <input type="email" id="email" placeholder="Email Address">

    <button onclick="pay()">Pay ₦100 & Get Code</button>

    <div class="code" id="code"></div>
</div>

<script>
const SUPABASE_URL = "https://dmnvkwagsnlfszoywduf.supabase.co";
const SUPABASE_ANON_KEY = "PASTE_YOUR_ANON_KEY_HERE";
const PAYSTACK_PUBLIC_KEY = "pk_live_536ee53fe26447d609c6f8cf6b21dbe698c451ea";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function pay() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;

    if (!name || !phone || !email) {
        alert("Fill all fields");
        return;
    }

    let handler = PaystackPop.setup({
        key: PAYSTACK_PUBLIC_KEY,
        email: email,
        amount: 10000,
        currency: "NGN",
        callback: function(response) {
            verifyPayment(response.reference, name, phone, email);
        },
        onClose: function() {
            alert("Payment cancelled");
        }
    });

    handler.openIframe();
}

async function verifyPayment(reference, name, phone, email) {
    const res = await fetch("https://dmnvkwagsnlfszoywduf.supabase.co/functions/v1/dynamic-service", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            reference,
            name,
            phone,
            email
        })
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("code").innerText = data.code;
    } else {
        alert(data.error);
    }
}
</script>

</body>
</html>
