<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iyal Surveys - Reset Password</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at top left, rgba(0,255,170,0.18), transparent 30%),
    radial-gradient(circle at bottom right, rgba(0,255,255,0.18), transparent 30%),
    linear-gradient(135deg, #020617, #071426, #03141f);
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  position: relative;
  color: white;
}

body::before {
  content: "";
  position: absolute;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(0,255,170,0.12), transparent 70%);
  filter: blur(40px);
  animation: floatGlow 8s infinite ease-in-out alternate;
}

@keyframes floatGlow {
  from {
    transform: translate(-80px, -40px);
  }

  to {
    transform: translate(80px, 40px);
  }
}

.container {
  width: 100%;
  max-width: 430px;
  padding: 24px;
  position: relative;
  z-index: 2;
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border-radius: 28px;
  padding: 35px 28px;
  box-shadow:
    0 0 40px rgba(0,255,170,0.12),
    inset 0 0 20px rgba(255,255,255,0.03);
}

.logo {
  text-align: center;
  margin-bottom: 22px;
}

.logo img {
  width: 95px;
  height: 95px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 25px rgba(0,255,170,0.35);
}

.brand {
  text-align: center;
  margin-bottom: 8px;
}

.brand h1 {
  font-size: 2rem;
  font-weight: 700;
  background: linear-gradient(to right, #00ffaa, #00e5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand p {
  color: rgba(255,255,255,0.72);
  font-size: 0.95rem;
  margin-top: 7px;
}

.input-group {
  position: relative;
  margin-top: 22px;
}

.input-group input {
  width: 100%;
  padding: 16px 52px 16px 52px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color: white;
  font-size: 1rem;
  outline: none;
  transition: 0.3s ease;
}

.input-group input:focus {
  border-color: #00ffaa;
  box-shadow: 0 0 20px rgba(0,255,170,0.22);
}

.input-group input::placeholder {
  color: rgba(255,255,255,0.45);
}

.input-group .left-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: #00ffaa;
  font-size: 1rem;
}

.eye-toggle {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: #00ffaa;
  cursor: pointer;
}

button {
  width: 100%;
  margin-top: 28px;
  padding: 15px;
  border: none;
  border-radius: 18px;
  background: linear-gradient(to right, #00ffaa, #00c8ff);
  color: #02131f;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 0 25px rgba(0,255,170,0.25);
}

button:hover {
  transform: translateY(-2px) scale(1.01);
}

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.spinner {
  width: 18px;
  height: 18px;
  border: 3px solid rgba(0,0,0,0.15);
  border-top: 3px solid #02131f;
  border-radius: 50%;
  display: none;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% {
    transform: rotate(0deg);
  }

  100% {
    transform: rotate(360deg);
  }
}

#status {
  margin-top: 18px;
  text-align: center;
  font-size: 0.96rem;
  min-height: 24px;
}

.bottom-link {
  text-align: center;
  margin-top: 22px;
}

.bottom-link a {
  color: #00ffaa;
  text-decoration: none;
  font-size: 0.95rem;
}

.cyber-line {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(0,255,170,0.7), transparent);
  margin: 25px 0;
}

@media (max-width: 480px) {
  .card {
    padding: 30px 22px;
  }

  .brand h1 {
    font-size: 1.7rem;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="logo">
      <img src="iyallogo.png" alt="Iyal Surveys Logo">
    </div>

    <div class="brand">
      <h1>Iyal Surveys</h1>
      <p>Create your new secure password</p>
    </div>

    <div class="cyber-line"></div>

    <div class="input-group">
      <i class="fa fa-lock left-icon"></i>

      <input
        type="password"
        id="newPassword"
        placeholder="New Password"
      />

      <span class="eye-toggle" onclick="togglePassword('newPassword', 'eye1')">
        <i class="fa fa-eye" id="eye1"></i>
      </span>
    </div>

    <div class="input-group">
      <i class="fa fa-shield-halved left-icon"></i>

      <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
      />

      <span class="eye-toggle" onclick="togglePassword('confirmPassword', 'eye2')">
        <i class="fa fa-eye" id="eye2"></i>
      </span>
    </div>

    <button id="resetBtn" onclick="resetPassword()">
      <span id="btnText">Update Password</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <p id="status"></p>

    <div class="bottom-link">
      <a href="login.html">
        <i class="fa fa-arrow-left"></i>
        Back to Login
      </a>
    </div>

  </div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://xkshzlfducmnglxfnxzk.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhrc2h6bGZkdWNtbmdseGZueHprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MjkxNDQsImV4cCI6MjA4MTAwNTE0NH0.xboUmMtODCPiOA6HbjgIOCztoNSnzeHsK2Kru3UQO_0";

const supabase = createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const status = document.getElementById("status");
const spinner = document.getElementById("spinner");
const btnText = document.getElementById("btnText");
const button = document.getElementById("resetBtn");

window.togglePassword = function(inputId, eyeId) {

  const input = document.getElementById(inputId);
  const eye = document.getElementById(eyeId);

  if (input.type === "password") {
    input.type = "text";
    eye.classList.remove("fa-eye");
    eye.classList.add("fa-eye-slash");
  } else {
    input.type = "password";
    eye.classList.remove("fa-eye-slash");
    eye.classList.add("fa-eye");
  }
};

window.resetPassword = async function() {

  const password =
    document.getElementById("newPassword")
    .value
    .trim();

  const confirmPassword =
    document.getElementById("confirmPassword")
    .value
    .trim();

  if (!password || !confirmPassword) {
    status.style.color = "#ff6b6b";
    status.textContent = "⚠️ Fill all fields";
    return;
  }

  if (password.length < 6) {
    status.style.color = "#ff6b6b";
    status.textContent = "⚠️ Password must be at least 6 characters";
    return;
  }

  if (password !== confirmPassword) {
    status.style.color = "#ff6b6b";
    status.textContent = "⚠️ Passwords do not match";
    return;
  }

  spinner.style.display = "block";
  btnText.textContent = "Updating...";
  button.disabled = true;

  try {

    const { error } =
      await supabase.auth.updateUser({
        password: password
      });

    if (error) throw error;

    status.style.color = "#00ffaa";
    status.textContent = "✅ Password updated successfully";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 2000);

  } catch (err) {

    status.style.color = "#ff6b6b";
    status.textContent = "❌ " + err.message;

  } finally {

    spinner.style.display = "none";
    btnText.textContent = "Update Password";
    button.disabled = false;
  }
};

</script>

</body>
</html>
