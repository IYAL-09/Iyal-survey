*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#07140d;
min-height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
position:relative;
color:white;
}

/* ANIMATED BACKGROUND */

.bg{
position:absolute;
inset:0;
overflow:hidden;
z-index:-2;
}

.glow{
position:absolute;
border-radius:50%;
filter:blur(80px);
animation:float 10s infinite alternate ease-in-out;
}

.glow1{
width:300px;
height:300px;
background:#00ff9950;
top:-80px;
left:-80px;
}

.glow2{
width:250px;
height:250px;
background:#00ff8840;
bottom:-50px;
right:-50px;
animation-delay:2s;
}

.glow3{
width:180px;
height:180px;
background:#00ffcc30;
top:40%;
left:55%;
animation-delay:4s;
}

@keyframes float{
from{
transform:translateY(0) translateX(0) scale(1);
}
to{
transform:translateY(-20px) translateX(15px) scale(1.08);
}
}

/* MAIN CARD */

.container{
width:100%;
max-width:430px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
border-radius:32px;
padding:40px 28px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.45);
animation:fadeUp .7s ease;
position:relative;
overflow:hidden;
}

.container::before{
content:'';
position:absolute;
width:180px;
height:180px;
background:rgba(0,255,153,.08);
border-radius:50%;
top:-70px;
right:-70px;
filter:blur(10px);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* LOGO */

.logo-wrap{
position:relative;
margin-bottom:22px;
}

.logo-ring{
position:absolute;
width:125px;
height:125px;
border:2px solid rgba(0,255,153,.3);
border-radius:50%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
animation:rotate 10s linear infinite;
}

@keyframes rotate{
to{
transform:translate(-50%,-50%) rotate(360deg);
}
}

.logo{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:3px solid #00ff99;
box-shadow:0 0 25px rgba(0,255,153,.45);
position:relative;
z-index:2;
}

/* TEXT */

h1{
font-size:2.2rem;
margin-bottom:10px;
font-weight:800;
background:linear-gradient(90deg,#00ff99,#8affcb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#c7fddf;
font-size:1rem;
line-height:1.6;
margin-bottom:35px;
}

/* BUTTONS */

.buttons{
display:flex;
flex-direction:column;
gap:16px;
margin-bottom:35px;
}

.btn{
text-decoration:none;
padding:16px;
border-radius:18px;
font-size:1rem;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
transition:.35s;
}

.btn-primary{
background:linear-gradient(135deg,#00ff99,#00c26e);
color:#07140d;
box-shadow:0 8px 25px rgba(0,255,153,.25);
}

.btn-primary:hover{
transform:translateY(-3px);
box-shadow:0 12px 35px rgba(0,255,153,.45);
}

.btn-secondary{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
color:white;
}

.btn-secondary:hover{
background:rgba(0,255,153,.12);
transform:translateY(-2px);
}

/* FEATURES */

.features{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.feature{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
border-radius:20px;
padding:18px 10px;
transition:.3s;
}

.feature:hover{
transform:translateY(-4px);
background:rgba(0,255,153,.08);
}

.feature i{
font-size:1.4rem;
margin-bottom:10px;
color:#00ff99;
}

.feature span{
font-size:.88rem;
color:#d8ffe8;
display:block;
line-height:1.4;
}

/* FOOTER */

.footer{
margin-top:28px;
font-size:.82rem;
color:#8eb7a1;
}

/* MOBILE */

@media(max-width:480px){

.container{
padding:35px 22px;
border-radius:28px;
}

h1{
font-size:1.9rem;
}

.features{
gap:10px;
}

.feature{
padding:14px 8px;
}

.feature span{
font-size:.78rem;
}

}
