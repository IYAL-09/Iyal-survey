<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>NaijaKolo Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#08140d;
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at top left,#16a34a55,transparent 35%),
radial-gradient(circle at bottom right,#22c55e44,transparent 35%),
#08140d;
}

.blur{
position:fixed;
width:300px;
height:300px;
border-radius:50%;
background:#22c55e22;
filter:blur(90px);
z-index:-1;
animation:float 8s infinite ease-in-out;
}

.blur1{
top:-80px;
left:-80px;
}

.blur2{
bottom:-100px;
right:-100px;
animation-delay:3s;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(30px);
}
}

/* HEADER */

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:52px;
height:52px;
border-radius:50%;
border:2px solid #22c55e;
object-fit:cover;
}

.logo h1{
font-size:1.2rem;
font-weight:700;
}

.menu-btn{
width:45px;
height:45px;
border-radius:14px;
background:#ffffff10;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(12px);
cursor:pointer;
font-size:1.2rem;
}

nav{
position:absolute;
top:80px;
right:20px;
background:#0f1d14ee;
backdrop-filter:blur(18px);
padding:15px;
border-radius:20px;
display:none;
flex-direction:column;
gap:14px;
width:220px;
border:1px solid #ffffff10;
z-index:100;
}

nav a{
text-decoration:none;
color:#d1fae5;
font-size:.95rem;
}

/* CONTAINER */

.container{
padding:20px;
padding-bottom:120px;
}

/* HELLO */

.hello-box{
margin-top:10px;
margin-bottom:22px;
animation:fadeUp .5s ease;
}

.hello-box h2{
font-size:1.6rem;
margin-bottom:8px;
}

.hello-box p{
color:#bbf7d0;
font-size:.95rem;
}

/* CARD */

.card{
background:#ffffff10;
backdrop-filter:blur(18px);
border:1px solid #ffffff12;
border-radius:30px;
padding:24px;
margin-bottom:24px;
box-shadow:0 10px 40px rgba(0,0,0,.25);
animation:fadeUp .6s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* BALANCE */

.balance-label{
font-size:.95rem;
color:#bbf7d0;
margin-bottom:12px;
}

.balance{
font-size:2.3rem;
font-weight:800;
margin-bottom:18px;
}

.balance-buttons{
display:flex;
gap:12px;
}

.balance-buttons button{
flex:1;
padding:14px;
border:none;
border-radius:18px;
font-size:.95rem;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.withdraw-btn{
background:linear-gradient(135deg,#16a34a,#22c55e);
color:white;
}

.history-btn{
background:#ffffff10;
color:white;
border:1px solid #ffffff10;
}

.balance-buttons button:hover{
transform:translateY(-2px);
}

/* OFFERWALLS */

.section-title{
font-size:1rem;
margin-bottom:16px;
color:#86efac;
}

.offerwalls{
display:grid;
grid-template-columns:1fr;
gap:16px;
}

.offer-btn{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px;
border-radius:22px;
background:#ffffff08;
border:1px solid #ffffff10;
text-decoration:none;
color:white;
transition:.3s;
}

.offer-btn:hover{
transform:translateY(-3px);
background:#ffffff12;
}

.offer-left{
display:flex;
align-items:center;
gap:14px;
}

.offer-icon{
width:52px;
height:52px;
border-radius:16px;
background:linear-gradient(135deg,#16a34a,#22c55e);
display:flex;
align-items:center;
justify-content:center;
font-size:1.2rem;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0b1610ee;
backdrop-filter:blur(18px);
display:flex;
justify-content:space-around;
padding:14px 0;
border-top:1px solid #ffffff10;
z-index:999;
}

.bottom-nav a{
color:white;
text-decoration:none;
font-size:.8rem;
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
}

.bottom-nav i{
font-size:1.1rem;
}

.active-nav{
color:#22c55e !important;
}

/* LOADER */

.loader{
width:24px;
height:24px;
border:3px solid #ffffff20;
border-top:3px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="blur blur1"></div>
<div class="blur blur2"></div>

<header>

<div class="logo">
<img src="logo.png">
<h1>NaijaKolo</h1>
</div>

<div class="menu-btn" onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</div>

<nav id="menu">
<a href="dashboard.html">Dashboard</a>
<a href="referral.html">Referral</a>
<a href="withdraw.html">Withdraw</a>
<a href="history.html">History</a>
<a href="#" onclick="logout()">Logout</a>
</nav>

</header>

<div class="container">

<div class="hello-box">
<h2 id="helloUser">Hello, User</h2>
<p>Welcome back to your earning dashboard.</p>
</div>

<div class="card">

<div class="balance-label">
Available Balance
</div>

<div class="balance" id="balance">
<div class="loader"></div>
</div>

<div class="balance-buttons">
<button class="withdraw-btn">
Withdraw
</button>

<button class="history-btn">
History
</button>
</div>

</div>

<div class="card">

<div class="section-title">
Offerwalls
</div>

<div class="offerwalls">

<a href="cpx.html" class="offer-btn">

<div class="offer-left">
<div class="offer-icon">
<i class="fas fa-coins"></i>
</div>

<div>
<h3>CPX Research</h3>
<p>Complete surveys</p>
</div>
</div>

<i class="fas fa-chevron-right"></i>

</a>

<a href="bitlabs.html" class="offer-btn">

<div class="offer-left">
<div class="offer-icon">
<i class="fas fa-bolt"></i>
</div>

<div>
<h3>BitLabs</h3>
<p>Earn rewards daily</p>
</div>
</div>

<i class="fas fa-chevron-right"></i>

</a>

<a href="wannads.html" class="offer-btn">

<div class="offer-left">
<div class="offer-icon">
<i class="fas fa-wallet"></i>
</div>

<div>
<h3>Wannads</h3>
<p>Tasks & surveys</p>
</div>
</div>

<i class="fas fa-chevron-right"></i>

</a>

</div>
</div>

</div>

<div class="bottom-nav">

<a href="dashboard.html" class="active-nav">
<i class="fas fa-home"></i>
<span>Home</span>
</a>

<a href="referral.html">
<i class="fas fa-users"></i>
<span>Referral</span>
</a>

<a href="withdraw.html">
<i class="fas fa-money-bill-wave"></i>
<span>Withdraw</span>
</a>

<a href="profile.html">
<i class="fas fa-user"></i>
<span>Profile</span>
</a>

</div>

<script>

/* SUPABASE */

const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* MENU */

function toggleMenu(){

const menu =
document.getElementById("menu");

menu.style.display =
menu.style.display === "flex"
? "none"
: "flex";
}

/* LOAD DASHBOARD */

async function loadDashboard(){

try{

const {
data: { session }
} = await supabase.auth.getSession();

if(!session){

window.location.href =
"login.html";

return;
}

const response = await fetch(
"YOUR_FUNCTION_URL",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":
`Bearer ${session.access_token}`
}
}
);

const data = await response.json();

console.log(data);

if(!data.success){

document.getElementById(
"balance"
).innerHTML = "₦0.00";

return;
}

/* USERNAME */

document.getElementById(
"helloUser"
).innerText =
`Hello, ${data.username}`;

/* BALANCE */

document.getElementById(
"balance"
).innerText =
`₦${Number(
data.balance || 0
).toFixed(2)}`;

}catch(err){

console.log(err);

document.getElementById(
"balance"
).innerHTML = "₦0.00";
}
}

loadDashboard();

/* LOGOUT */

async function logout(){

await supabase.auth.signOut();

window.location.href =
"login.html";
}

</script>

</body>
</html>
