<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Iyal Surveys - Reset Password</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at top left, rgba(0,255,170,0.18), transparent 30%),
    radial-gradient(circle at bottom right, rgba(0,255,255,0.18), transparent 30%),
    linear-gradient(135deg, #020617, #071426, #03141f);
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

.container {
  width: 100%;
  max-width: 430px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(22px);
  border-radius: 28px;
  padding: 30px;
}

.logo {
  text-align: center;
  margin-bottom: 15px;
}

.logo img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
}

.brand {
  text-align: center;
  margin-bottom: 15px;
}

.brand h1 {
  color: #00ffaa;
}

.input-group {
  position: relative;
  margin-top: 18px;
}

.input-group input {
  width: 100%;
  padding: 14px 45px;
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  color: white;
}

.left-icon {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: #00ffaa;
}

.eye-toggle {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #00ffaa;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  border: none;
  border-radius: 15px;
  background: linear-gradient(to right, #00ffaa, #00d9ff);
  color: #001018;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
}

.spinner {
  display: none;
}

/* PASSWORD STRENGTH */
.strength-bar {
  height: 8px;
  width: 100%;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  margin-top: 10px;
}

.strength-fill {
  height: 100%;
  width: 0%;
  border-radius: 20px;
  transition: 0.3s;
}

.requirement {
  font-size: 13px;
  margin-top: 6px;
  display: flex;
  gap: 8px;
  align-items: center;
  opacity: 0.8;
}

.valid { color: #00ffaa; }
.invalid { color: #ff6b6b; }

/* SUPPORT BUTTON */
.support-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: #00ffaa;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #001018;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="logo">
  <img src="iyallogo.png">
</div>

<div class="brand">
  <h1>Iyal Surveys</h1>
  <p>Reset your secure password</p>
</div>

<!-- PASSWORD -->
<div class="input-group">
  <i class="fa fa-lock left-icon"></i>
  <input type="password" id="newPassword" placeholder="New Password">
  <span class="eye-toggle" onclick="toggle('newPassword','eye1')">
    <i class="fa fa-eye" id="eye1"></i>
  </span>
</div>

<div class="strength-bar">
  <div id="fill" class="strength-fill"></div>
</div>

<div id="req1" class="requirement">❌ At least 6 characters</div>
<div id="req2" class="requirement">❌ 1 uppercase letter</div>
<div id="req3" class="requirement">❌ 1 number</div>
<div id="req4" class="requirement">❌ 1 special character</div>

<!-- CONFIRM -->
<div class="input-group">
  <i class="fa fa-lock left-icon"></i>
  <input type="password" id="confirmPassword" placeholder="Confirm Password">
</div>

<!-- CAPTCHA -->
<div class="g-recaptcha"
  data-sitekey="6Lf22SosAAAAADDRkt-YuGTX57eNEXjYSWfJJOHz"></div>

<button id="btn" onclick="resetPassword()">
  Update Password
</button>

<p id="status"></p>

</div>
</div>

<!-- SUPPORT -->
<div class="support-btn">
<i class="fa fa-headset"></i>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL =
"https://xkshzlfducmnglxfnxzk.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhrc2h6bGZkdWNtbmdseGZueHprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MjkxNDQsImV4cCI6MjA4MTAwNTE0NH0.xboUmMtODCPiOA6HbjgIOCztoNSnzeHsK2Kru3UQO_0";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const status = document.getElementById("status");
const btn = document.getElementById("btn");

/* PASSWORD STRENGTH */
const p = document.getElementById("newPassword");

p.addEventListener("input", () => {

  const v = p.value;

  const ok1 = v.length >= 6;
  const ok2 = /[A-Z]/.test(v);
  const ok3 = /[0-9]/.test(v);
  const ok4 = /[^A-Za-z0-9]/.test(v);

  document.getElementById("req1").textContent =
    (ok1 ? "✔" : "❌") + " At least 6 characters";

  document.getElementById("req2").textContent =
    (ok2 ? "✔" : "❌") + " 1 uppercase letter";

  document.getElementById("req3").textContent =
    (ok3 ? "✔" : "❌") + " 1 number";

  document.getElementById("req4").textContent =
    (ok4 ? "✔" : "❌") + " 1 special character";

  let strength = [ok1, ok2, ok3, ok4].filter(Boolean).length;

  document.getElementById("fill").style.width =
    (strength * 25) + "%";
});

/* TOGGLE */
window.toggle = function(id, eyeId) {
  const i = document.getElementById(id);
  const e = document.getElementById(eyeId);

  if (i.type === "password") {
    i.type = "text";
    e.classList = "fa fa-eye-slash";
  } else {
    i.type = "password";
    e.classList = "fa fa-eye";
  }
};

/* RESET PASSWORD */
window.resetPassword = async function () {

  const password = p.value;
  const confirm = document.getElementById("confirmPassword").value;

  const token = grecaptcha.getResponse();

  if (!token) {
    status.textContent = "Complete reCAPTCHA";
    return;
  }

  if (password !== confirm) {
    status.textContent = "Passwords do not match";
    return;
  }

  if (
    password.length < 6 ||
    !/[A-Z]/.test(password) ||
    !/[0-9]/.test(password) ||
    !/[^A-Za-z0-9]/.test(password)
  ) {
    status.textContent = "Weak password";
    return;
  }

  try {

    const captchaRes = await fetch(
      "https://xkshzlfducmnglxfnxzk.supabase.co/functions/v1/smooth-processor",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ recaptcha_token: token })
      }
    );

    const data = await captchaRes.json();
    if (!data.success) throw new Error("Captcha failed");

    const { error } = await supabase.auth.updateUser({
      password
    });

    if (error) throw error;

    status.style.color = "#00ffaa";
    status.textContent = "Password updated successfully";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 2000);

  } catch (e) {
    status.style.color = "red";
    status.textContent = e.message;
  }
};
</script>

</body>
</html>
