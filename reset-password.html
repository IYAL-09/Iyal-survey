<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iyal Surveys - Reset Password</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at top,#00ffaa22,transparent 35%),
    radial-gradient(circle at bottom,#00d9ff22,transparent 40%),
    linear-gradient(135deg,#020617,#050b1a,#000814);
  color:white;
}

.container{
  width:100%;
  max-width:450px;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(25px);
  border-radius:30px;
  padding:30px;
  box-shadow:0 0 40px rgba(0,255,170,0.12);
}

.logo{
  text-align:center;
  margin-bottom:10px;
}

.logo img{
  width:90px;
  height:90px;
  border-radius:50%;
  box-shadow:0 0 25px #00ffaa55;
}

.brand{
  text-align:center;
  margin-bottom:10px;
}

.brand h1{
  background:linear-gradient(90deg,#00ffaa,#00d9ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-size:1.8rem;
}

.brand p{
  opacity:0.8;
  font-size:0.9rem;
}

.input-group{
  position:relative;
  margin-top:18px;
}

.input-group input{
  width:100%;
  padding:14px 48px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05);
  color:white;
  outline:none;
  transition:0.3s;
}

.input-group input:focus{
  border-color:#00ffaa;
  box-shadow:0 0 18px #00ffaa33;
}

.left-icon{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:#00ffaa;
}

.eye-toggle{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#00ffaa;
  font-size:1.05rem;
}

.eye-toggle:hover{
  color:#00d9ff;
}

button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:linear-gradient(90deg,#00ffaa,#00d9ff);
  color:#001018;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 0 25px #00ffaa33;
}

button:hover{
  transform:scale(1.01);
}

/* RECAPTCHA 2080 STYLE */
.g-recaptcha{
  margin-top:20px;
  display:flex;
  justify-content:center;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.1);
  transform:scale(1.03);
}

#status{
  margin-top:12px;
  text-align:center;
  min-height:20px;
  font-size:0.9rem;
}

/* PASSWORD STRENGTH */
.strength-bar{
  height:8px;
  width:100%;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  margin-top:10px;
  overflow:hidden;
}

.strength-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff4d4d,#ffaa00,#00ffaa);
  transition:0.3s;
}

.requirement{
  font-size:12px;
  margin-top:6px;
  opacity:0.85;
}

.valid{color:#00ffaa;}
.invalid{color:#ff6b6b;}

/* SUPPORT BUTTON */
.support-btn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:linear-gradient(135deg,#00ffaa,#00d9ff);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#001018;
  box-shadow:0 0 25px #00ffaa55;
  cursor:pointer;
  text-decoration:none;
}

/* BACK TO LOGIN */
.back-login{
  text-align:center;
  margin-top:15px;
}

.back-login a{
  color:#00d9ff;
  text-decoration:none;
  font-size:0.9rem;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="logo">
  <img src="iyallogo.png" />
</div>

<div class="brand">
  <h1>Iyal Surveys</h1>
  <p>Secure password reset</p>
</div>

<div class="input-group">
  <i class="fa fa-lock left-icon"></i>
  <input type="password" id="newPassword" placeholder="New Password" />
  <span class="eye-toggle" onclick="toggle('newPassword','eye1')">
    <i class="fa fa-eye" id="eye1"></i>
  </span>
</div>

<div class="strength-bar">
  <div class="strength-fill" id="fill"></div>
</div>

<div class="requirement" id="r1">❌ 6+ characters</div>
<div class="requirement" id="r2">❌ 1 uppercase</div>
<div class="requirement" id="r3">❌ 1 number</div>
<div class="requirement" id="r4">❌ 1 special character</div>

<div class="input-group">
  <i class="fa fa-lock left-icon"></i>
  <input type="password" id="confirmPassword" placeholder="Confirm Password" />
</div>

<div class="g-recaptcha" data-sitekey="6Lf22SosAAAAADDRkt-YuGTX57eNEXjYSWfJJOHz"></div>

<button onclick="resetPassword()">Update Password</button>

<p id="status"></p>

<div class="back-login">
  <a href="login.html">← Back to Login</a>
</div>

</div>
</div>

<a class="support-btn" href="support.html">
<i class="fa fa-headset"></i>
</a>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
"https://xkshzlfducmnglxfnxzk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhrc2h6bGZkdWNtbmdseGZueHprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MjkxNDQsImV4cCI6MjA4MTAwNTE0NH0.xboUmMtODCPiOA6HbjgIOCztoNSnzeHsK2Kru3UQO_0"
);

const status=document.getElementById("status");
const btn=document.querySelector("button");
const fill=document.getElementById("fill");

window.toggle=function(id,eye){
  const i=document.getElementById(id);
  const e=document.getElementById(eye);
  i.type=i.type==="password"?"text":"password";
  e.classList.toggle("fa-eye");
  e.classList.toggle("fa-eye-slash");
}

const p=document.getElementById("newPassword");

p.addEventListener("input",()=>{
  const v=p.value;
  const a=v.length>=6;
  const b=/[A-Z]/.test(v);
  const c=/[0-9]/.test(v);
  const d=/[^A-Za-z0-9]/.test(v);

  document.getElementById("r1").textContent=(a?"✔":"❌")+" 6+ characters";
  document.getElementById("r2").textContent=(b?"✔":"❌")+" 1 uppercase";
  document.getElementById("r3").textContent=(c?"✔":"❌")+" 1 number";
  document.getElementById("r4").textContent=(d?"✔":"❌")+" 1 special";

  fill.style.width=(a+b+c+d)*25+"%";
});

window.resetPassword=async()=>{

const password=p.value;
const confirm=document.getElementById("confirmPassword").value;
const token=grecaptcha.getResponse();

if(!token){status.textContent="Complete captcha";return;}
if(password!==confirm){status.textContent="Mismatch password";return;}

const res=await fetch("https://xkshzlfducmnglxfnxzk.supabase.co/functions/v1/smooth-processor",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({recaptcha_token:token})
});

const data=await res.json();
if(!data.success){status.textContent="Captcha failed";return;}

const {error}=await supabase.auth.updateUser({password});

if(error){status.textContent=error.message;return;}

status.style.color="#00ffaa";
status.textContent="Password updated";

setTimeout(()=>location.href="login.html",2000);
}
</script>

</body>
</html>
