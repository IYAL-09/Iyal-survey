<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Iyal Surveys - Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <!-- Favicon -->
<link rel="icon" type="image/png" href="iyallogo.png">
<link rel="apple-touch-icon" href="iyallogo.png">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom right, #e8f5e9, #c8e6c9);
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 10px #ccc;
}

.logo {
  text-align: center;
  margin-bottom: 15px;
}

.logo img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 4px solid white;
  object-fit: cover;
}

h2 {
  text-align: center;
  color: #2e7d32;
  margin-bottom: 20px;
}

.input-group {
  position: relative;
  margin-bottom: 20px;
}

.input-group i.fa {
  position: absolute;
  top: 50%;
  left: 12px;
  transform: translateY(-50%);
  color: #4caf50;
  font-size: 1.1em;
}

.input-group input {
  width: 100%;
  padding: 10px 38px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 1em;
  box-sizing: border-box;
}

.eye-toggle {
  position: absolute;
  top: 50%;
  right: 37px;
  transform: translateY(-50%);
  cursor: pointer;
  color: #4caf50;
}

button {
  width: 100%;
  padding: 12px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1em;
  cursor: pointer;
  display: flex;
  justify-content: center;
  gap: 8px;
}

button:hover {
  background: #1b5e20;
}

button:disabled {
  background: #9e9e9e;
}

.spinner {
  border: 3px solid #f3f3f3;
  border-top: 3px solid white;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  animation: spin 1s linear infinite;
  display: none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

#status {
  text-align: center;
  margin-top: 10px;
  color: red;
}

.actions {
  text-align: center;
  margin-top: 15px;
}

.actions a {
  color: #2e7d32;
  text-decoration: underline;
  display: block;
  margin-top: 10px;
}

.g-recaptcha {
  margin-bottom: 15px;
  display: flex;
  justify-content: center;
  padding: 10px;
  border-radius: 10px;
  background: #f7f7f7;
  border: 1px solid #ddd;
}

.support-btn {
  position: fixed;
  bottom: 18px;
  left: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2e7d32, #4caf50);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.25);
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="iyallogo.png" alt="Iyal Logo" />
  </div>

  <h2>Welcome Back</h2>

  <div class="input-group">
    <i class="fa fa-envelope"></i>
    <input type="email" id="email" placeholder="Email" />
  </div>

  <div class="input-group">
    <i class="fa fa-lock"></i>
    <input type="password" id="password" placeholder="Password" />
    <span class="eye-toggle" onclick="togglePassword()">
      <i class="fa fa-eye" id="eyeIcon"></i>
    </span>
  </div>

  <div class="g-recaptcha" data-sitekey="6Lf22SosAAAAADDRkt-YuGTX57eNEXjYSWfJJOHz"></div>

  <button onclick="login()" id="loginBtn">
    <span id="btnText">Login</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <p id="status"></p>

  <div class="actions">
    <a href="#" onclick="event.preventDefault(); forgotPassword()">Forgot Password?</a>
    <a href="register.html"><i class="fa fa-user-plus"></i> Create new account</a>
  </div>
</div>

<a href="support.html" class="support-btn" title="Do you need support?">
  <i class="fa fa-headset"></i>
</a>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://xkshzlfducmnglxfnxzk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhrc2h6bGZkdWNtbmdseGZueHprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MjkxNDQsImV4cCI6MjA4MTAwNTE0NH0.xboUmMtODCPiOA6HbjgIOCztoNSnzeHsK2Kru3UQO_0";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const status = document.getElementById("status");
const spinner = document.getElementById("spinner");
const btnText = document.getElementById("btnText");
const button = document.getElementById("loginBtn");

window.togglePassword = function () {
  const input = document.getElementById("password");
  const icon = document.getElementById("eyeIcon");

  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace("fa-eye", "fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.replace("fa-eye-slash", "fa-eye");
  }
};

window.login = async function () {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const recaptchaToken = grecaptcha.getResponse();

  if (!email || !password) {
    status.textContent = "⚠️ Enter email & password";
    return;
  }

  if (!recaptchaToken) {
    status.textContent = "⚠️ Complete reCAPTCHA";
    return;
  }

  spinner.style.display = "inline-block";
  btnText.textContent = "Logging in...";
  button.disabled = true;

  try {

    const captchaRes = await fetch(
      "https://xkshzlfducmnglxfnxzk.supabase.co/functions/v1/smooth-processor",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ recaptcha_token: recaptchaToken })
      }
    );

    const captchaData = await captchaRes.json();
    if (!captchaData.success) throw new Error("Captcha failed");

   const { data, error } = await supabase.auth.signInWithPassword({
  email,
  password
});

if (error) {

  if (
    error.message.includes("Email not confirmed") ||
    error.message.includes("email_not_confirmed")
  ) {

    throw new Error(
      "Please verify your email before logging in."
    );

  }

 console.log(error);
throw new Error(error.message);
    status.style.color = "green";
    status.textContent = "✅ Login successful";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);

  } catch (err) {
    status.style.color = "red";
    status.textContent = err.message || "Login failed";
    grecaptcha.reset();
  } finally {
    spinner.style.display = "none";
    btnText.textContent = "Login";
    button.disabled = false;
  }
};

window.forgotPassword = async function () {

  const email = document.getElementById("email").value.trim();

  if (!email) {
    status.textContent = "⚠️ Enter email first";
    return;
  }

  // Validate email format
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    status.textContent = "⚠️ Enter a valid email address";
    return;
  }

  // Get current origin (domain)
  const currentOrigin = window.location.origin;
  console.log("Current origin:", currentOrigin);
  
  // Use the origin directly without the redirectTo param first
  // Let Supabase use the Site URL from dashboard
  
  // Show loading state
  status.style.color = "#666";
  status.textContent = "⏳ Sending reset email...";

  try {

    // Try WITHOUT redirectTo first - let Supabase use Site URL
   const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
  redirectTo: "https://iyal-survey.vercel.app/reset-password.html"
});

    console.log("Reset password response:", { data, error });

    if (error) {
      // Check the error more thoroughly
      const errorMsg = error.message || error.toString();
      console.log("Error message:", errorMsg);
      
      // Handle specific error cases
      if (errorMsg.includes("not found") || errorMsg.includes("User not found")) {
        // For security, still show success but log it
        status.style.color = "green";
        status.textContent = "✅ If this email is registered, a reset link has been sent";
        return;
      }
      
      // Other errors - show the actual message
      status.style.color = "red";
      status.textContent = "Error: " + errorMsg;
      return;
    }

    // Success - show generic message
    status.style.color = "green";
    status.textContent = "✅ If this email is registered, a reset link has been sent";

  } catch (err) {
    console.error("Caught exception:", err);
    status.style.color = "red";
    status.textContent = "An unexpected error occurred";
  }
};
</script>

</body>
</html>
